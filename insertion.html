<<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插入排序 - 展示</title>
    <style>
        /* 樣式同 0309.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { background: white; border-radius: 15px; max-width: 800px; margin: 0 auto; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .nav { margin-bottom: 20px; }
        .nav a { text-decoration: none; color: #667eea; font-weight: bold; }
        .visualizer { display: flex; align-items: flex-end; justify-content: center; height: 200px; gap: 8px; margin: 20px 0; background: #f8f9fa; padding: 20px; border-radius: 10px; }
        .bar { background: #764ba2; width: 35px; transition: 0.1s; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; border-radius: 4px 4px 0 0; }
        .bar.active { background: #ff4757; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        pre { background: #2d3436; color: #a29bfe; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"><a href="index.html">← 返回首頁</a></div>
        <h1>📍 插入排序法 (Insertion Sort)</h1>
        <p>將數組分為已排序與未排序，逐一將未排序元素插入已排序序列的正確位置。</p>
        <div class="controls">
            速度：<input type="range" id="speed" min="50" max="1000" value="500">
            <button onclick="startSort()">開始排序</button>
            <button onclick="reset()" style="background:#ccc; color:#333;">重置</button>
        </div>
        <div id="viz" class="visualizer"></div>
        <pre>while (j >= 0 && arr[j] > key) { arr[j+1] = arr[j]; j--; }</pre>
    </div>
    <script>
        let data = [33, 12, 55, 8, 24, 42, 19];
        function render(active = []) {
            const viz = document.getElementById('viz'); viz.innerHTML = '';
            data.forEach((v, i) => {
                const b = document.createElement('div'); b.className = 'bar' + (active.includes(i) ? ' active' : '');
                b.style.height = v * 3 + 'px'; b.innerText = v; viz.appendChild(b);
            });
        }
        async function startSort() {
            for (let i = 1; i < data.length; i++) {
                let key = data[i]; let j = i - 1;
                while (j >= 0 && data[j] > key) {
                    data[j + 1] = data[j];
                    render([j]);
                    await new Promise(r => setTimeout(r, 1050 - document.getElementById('speed').value));
                    j--;
                }
                data[j + 1] = key; render();
            }
            alert("完成！");
        }
        function reset() { data = [33, 12, 55, 8, 24, 42, 19]; render(); }
        render();
    </script>
</body>
</html>
