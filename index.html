<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主頁 - 排序演算法練習</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', 'Arial', sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        /* 讓連結區塊在較大螢幕時並排顯示 */
        .links-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .link-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .link-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        
        .link-card h2 {
            margin-bottom: 8px;
            font-size: 1.3em;
        }
        
        .link-card p {
            font-size: 0.9em;
            opacity: 0.85;
        }
        
        .icon {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        /* 沈澱排序法給予不同的漸層色，突顯它是特製的 */
        .special-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 排序演算法練習</h1>
        <p class="subtitle">電機系學生必備的五大基礎排序實作</p>
        
        <div class="links-section">
            <a href="0309.html" class="link-card">
                <div class="icon">🔄</div>
                <h2>氣泡排序法</h2>
                <p>Bubble Sort</p>
            </a>

            <a href="selection.html" class="link-card">
                <div class="icon">🎯</div>
                <h2>選擇排序法</h2>
                <p>Selection Sort</p>
            </a>

            <a href="insertion.html" class="link-card">
                <div class="icon">📍</div>
                <h2>插入排序法</h2>
                <p>Insertion Sort</p>
            </a>

            <a href="merge.html" class="link-card">
                <div class="icon">🧩</div>
                <h2>合併排序法</h2>
                <p>Merge Sort</p>
            </a>

            <a href="sedimentation.html" class="link-card special-card">
                <div class="icon">⏳</div>
                <h2>沈澱排序法</h2>
                <p>Sedimentation Sort (Unique)</p>
            </a>
        </div>
    </div>
</body>
</html>
