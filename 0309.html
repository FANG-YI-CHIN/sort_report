<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JavaScript 氣泡排序法範例</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 5px solid #2196F3; }
        #result { margin-top: 20px; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>

    <h2>氣泡排序法 (Bubble Sort)</h2>
    <p>原始陣列：[64, 34, 25, 12, 22, 11, 90]</p>
    
    <div class="code-box">
        請打開瀏覽器開發者工具 (F12) 的 <strong>Console</strong> 查看排序過程。
    </div>

    <div id="result"></div>

    <script>
        function bubbleSort(arr) {
            let n = arr.length;
            let temp;
            
            // 外層迴圈：控制比較的輪數
            for (let i = 0; i < n - 1; i++) {
                // 內層迴圈：進行相鄰元素的比較與交換
                // 每跑完一輪，最大的數會被移到最後面，所以 j < n - 1 - i
                for (let j = 0; j < n - 1 - i; j++) {
                    if (arr[j] > arr[j + 1]) {
                        // 交換元素
                        temp = arr[j];
                        arr[j] = arr[j + 1];
                        arr[j + 1] = temp;
                        
                        console.log(`交換中: ${arr}`);
                    }
                }
                console.log(`第 ${i + 1} 輪結束: ${arr}`);
            }
            return arr;
        }

        // 測試資料
        const data = [64, 34, 25, 12, 22, 11, 90];
        const sortedData = bubbleSort([...data]); // 使用展開運算子避免改到原陣列

        // 顯示結果到網頁上
        document.getElementById('result').innerText = "排序後的結果：" + sortedData.join(', ');
    </script>
</body>
</html>
